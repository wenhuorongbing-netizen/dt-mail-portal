      - listitem [ref=e84]: 不要修改 TicketPlus+ 账号、邮箱、密码、订阅或支付方式。
      - listitem [ref=e85]: 未来月份车票通常在当月 1 日凌晨约 03:00 后才会激活显示。
      - listitem [ref=e86]: 每个邮箱或账号通常只能绑定一张有效 Deutschlandticket。
      - listitem [ref=e87]: 如果 Wallet 链接过期、无法打开或显示信息不对，请联系客服补发或核对。
