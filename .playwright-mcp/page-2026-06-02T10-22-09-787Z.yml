    - list [ref=e64]:
      - listitem [ref=e65]:
        - strong [ref=e66]: 打开官方添加链接：
        - text: 使用客服发送的 Apple Wallet 或 Google Wallet 链接。不要使用非官方自制 pass 或二维码截图作为最终交付。
      - listitem [ref=e67]:
        - strong [ref=e68]: 微信打不开时换浏览器：
        - text: 如果在微信内点击无反应，请复制链接到 Safari、Chrome 或手机默认浏览器打开。
      - listitem [ref=e69]:
        - strong [ref=e70]: 确认实名信息：
        - text: 添加前检查车票姓名、月份和二维码页面是否正常显示。
      - listitem [ref=e71]:
        - strong [ref=e72]: 保存到手机 Wallet：
        - text: iPhone 选择添加到 Apple Wallet；Android 按页面提示添加到 Google Wallet 或系统钱包。
      - listitem [ref=e73]:
        - strong [ref=e74]: 乘车前检查：
        - text: 出发前打开 Wallet，确认二维码能显示，手机有电并可离线打开。
      - listitem [ref=e75]:
        - strong [ref=e76]: 验票时出示证件：
        - text: Deutschlandticket 是实名票，查票时可能要求出示护照或身份证件。
