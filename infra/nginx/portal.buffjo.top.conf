# Production example. Adjust upstream/container names after deployment.
server {
  listen 80;
  server_name portal.buffjo.top;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name portal.buffjo.top;

  ssl_certificate /etc/letsencrypt/live/portal.buffjo.top/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/portal.buffjo.top/privkey.pem;

  root /var/www/dt-mail-portal/frontend/dist;
  index index.html;

  location / {
    try_files $uri /index.html;
  }
}
